<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">

<meta property="og:title" content="Poráčska dolina" />
<meta property="og:type" content="website" />
<meta property="og:image" content="https://i.ibb.co/svkgZ96J/ico.jpg" />
<meta property="og:image:secure_url" content="https://i.ibb.co/svkgZ96J/ico.jpg" />
<meta property="og:description" content="Virtuálna prehliadka v Poráčskej doline" />
<meta property="og:url" content="https://lacihvi.github.io/Poracska_dolina/" />
<meta name="twitter:card" content="summary_large_image">

<title>Poráčska dolina</title>

<style>
body {
    margin: 0;
    font-family: Arial, sans-serif;
    background: linear-gradient(135deg, #1a1a1a, #000000);
    color: white;
    display: flex;
    align-items: center;
    justify-content: center;
    height: 100vh;
    text-align: center;
    overflow: hidden;
}

/* fade-out efekt */
body.fade-out {
    opacity: 0;
    transition: opacity 0.8s ease;
}

.container {
    max-width: 420px;
    padding: 20px;
    border-radius: 20px;
    background: rgba(255,255,255,0.05);
    backdrop-filter: blur(10px);
    box-shadow: 0 10px 30px rgba(0,0,0,0.6);
    animation: fadeIn 1s ease;
}

img {
    width: 100%;
    border-radius: 12px;
    margin-bottom: 15px;
    transition: transform 1s ease;
}

/* zoom efekt pred prechodom */
img.zoom {
    transform: scale(1.2);
}

h1 {
    margin: 10px 0;
    font-size: 24px;
}

.spinner {
    margin: 15px auto;
    width: 30px;
    height: 30px;
    border: 3px solid rgba(255,255,255,0.2);
    border-top: 3px solid white;
    border-radius: 50%;
    animation: spin 1s linear infinite;
}

.loader {
    margin-top: 10px;
    font-size: 14px;
    opacity: 0.7;
}

@keyframes spin {
    0% { transform: rotate(0deg); }
    100% { transform: rotate(360deg); }
}

@keyframes fadeIn {
    from { opacity: 0; transform: translateY(10px); }
    to { opacity: 1; transform: translateY(0); }
}
</style>

<script>
setTimeout(function() {
    document.body.classList.add("fade-out");
    document.querySelector("img").classList.add("zoom");

    setTimeout(function() {
        window.location.href = "https://lacihvi.42web.io/Pano/Poracska_dolina/tour.html";
    }, 800);

}, 1200);
</script>

</head>

<body>
<div class="container">
    <img src="https://i.ibb.co/svkgZ96J/ico.jpg" alt="Poráčska dolina">
    <h1>Poráčska dolina</h1>
    <div class="spinner"></div>
    <div class="loader">Načítavam virtuálnu prehliadku...</div>
</div>
</body>
</html>
